```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Web Project</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Docker Web Project</h1>
        <p class="subtitle">Node.js + MySQL + Docker</p>

        <div class="card">
            <h2>Add New User</h2>

            <form id="userForm">

                <input
                    type="text"
                    id="name"
                    placeholder="Enter name"
                    required
                >

                <input
                    type="email"
                    id="email"
                    placeholder="Enter email"
                    required
                >

                <button type="submit">
                    Add User
                </button>

            </form>

            <p id="message"></p>

        </div>

        <div class="card">

            <div class="header">

                <h2>Users</h2>

                <button id="refreshBtn">
                    Refresh
                </button>

            </div>

            <table>

                <thead>

                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                    </tr>

                </thead>

                <tbody id="usersTable">

                </tbody>

            </table>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>

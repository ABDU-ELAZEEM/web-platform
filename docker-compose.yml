services:
#==================Database==============
  mysql:
    image: mysql:8.0
    container_name: mysql-container

    env_file:
      - .env

    volumes:
      - mysql-data:/var/lib/mysql
      - ./infrastructure/database/init:/docker-entrypoint-initdb.d

    ports:
      - "3306:3306"

    networks:
       -  backend-network

    restart: unless-stopped
   
    cpus: "0.75"
    mem_limit: 700m

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

#========================Backend===============
  backend:
    build:
      context: ./app/backend
    container_name: backend-container
  
    env_file:
      - .env

    #ports:
      #- "3000:3000"

    networks:
      - backend-network

    depends_on:
       mysql:
          condition: service_healthy
    restart: unless-stopped
    cpus: "0.5"
    mem_limit: 150m

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


#============Frontend===================================
  frontend:
    build:
      context: ./app/frontend

    container_name: frontend-container

    #ports:
     # - "8080:80"

    networks:
      - web-network

    restart: unless-stopped
    
    cpus: "0.1"
    mem_limit: 50m

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

#================ProxyService==================================
  reverse-proxy:
    build:
      context: ./infrastructure/proxy

    container_name: proxy-srver

    ports:
      - "80:80"

    networks:
      - web-network
      - backend-network

    depends_on:
        frontend:
          condition: service_healthy
        backend:
          condition: service_healthy

    restart: unless-stopped

    cpus: "0.1"
    mem_limit: 50m

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

#=============Monitoring===========================
  prometheus:
      image: prom/prometheus:latest

      container_name: prometheus

      ports:
        - "9090:9090"

      volumes:
        - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        - prometheus-data:/prometheus
      networks:
        - backend-network
      restart: unless-stopped

      cpus: "0.5"
      mem_limit: 200m

      healthcheck:
        test: ["CMD", "wget", "--spider", "http://localhost:9090/-/healthy"]
        interval: 30s
        timeout: 5s
        retries: 3
        start_period: 15s

      logging:
        driver: "json-file"
        options:
          max-size: "10m"
          max-file: "3"
#--------------------------
  node-exporter:
    image: prom/node-exporter:latest

    container_name: node-exporter

    ports:
      - "9100:9100"

    networks:
      - backend-network
    restart: unless-stopped

    cpus: "0.1"
    mem_limit: 50m

    command:
      - '--path.rootfs=/host'

    volumes:
      - '/:/host:ro,rslave'

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
#------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest

    container_name: cadvisor

    ports:
      - "8081:8080"

    networks:
      - backend-network

    restart: unless-stopped

    cpus: "0.25"
    mem_limit: 250m

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
#------------------------------------          
  grafana:
    image: grafana/grafana:latest

    container_name: grafana

    ports:
      - "3001:3000"

    volumes:
      - grafana-data:/var/lib/grafana

    networks:
      - backend-network

    depends_on:
      - prometheus

    restart: unless-stopped

    cpus: "0.5"
    mem_limit: 300m

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

#volume decalration 
volumes:
  mysql-data:
  grafana-data:
  prometheus-data:

networks:
  backend-network:
    driver: bridge

  web-network:
    driver: bridge
